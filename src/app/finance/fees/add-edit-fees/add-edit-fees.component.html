<form [formGroup]="feesForm" (submit)="addFees()">
  <mat-card>
    <mat-card-header>
      <mat-card-title class="card-title"> Add New Fees </mat-card-title>
    </mat-card-header>
    <mat-card-content>

      <mat-form-field class="term">
        <mat-label>Term</mat-label>
        <mat-select formControlName="term">
          <mat-option *ngFor="let term of terms$ | async" [value]="term">
            {{ term.num + " " + term.year }}
          </mat-option>

        </mat-select>
      </mat-form-field>

      <mat-form-field class="resi">
        <mat-label>Residence</mat-label>
        <mat-select formControlName="residence">
          <mat-option *ngFor="let residence of residences" [value]="residence">
            {{ residenceToString(residence) }}
          </mat-option>

        </mat-select>
      </mat-form-field>

      <mat-form-field class="amount">
        <mat-label>Amount</mat-label>
        <input matInput formControlName="amount">
      </mat-form-field>

      <mat-form-field class="des">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description"></textarea>
      </mat-form-field>


    </mat-card-content>
    <mat-card-footer>
      <mat-card-actions class="actions">
        <button class="submit-btn" type="submit" color="primary" mat-raised-button>
          Add Fees
        </button>
      </mat-card-actions>
    </mat-card-footer>
  </mat-card>
</form>
